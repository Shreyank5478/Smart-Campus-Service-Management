<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Smart Campus Service Management</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      background: linear-gradient(to bottom right, #eff6ff, #dbeafe);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    
    h1 {
      color: #1e40af;
      margin-bottom: 20px;
      font-size: 32px;
    }
    
    .user-info {
      background: #f0f9ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }
    
    .user-info p {
      margin: 10px 0;
      color: #1f2937;
    }
    
    .user-info strong {
      color: #1e40af;
    }
    
    .loading {
      color: #6b7280;
      font-size: 18px;
      margin: 20px 0;
    }
    
    .spinner {
      border: 4px solid #e5e7eb;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    button {
      background: #dc2626;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 20px;
    }
    
    button:hover {
      background: #991b1b;
    }
    
    .error {
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 16px;
      border-radius: 6px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dashboard</h1>
    
    <div id="auth-checking" class="loading">
      <div class="spinner"></div>
      <p>Verifying authentication...</p>
    </div>
    
    <div id="auth-failed" class="error" style="display: none;">
      <p>You are not authenticated. Redirecting to login...</p>
    </div>
    
    <div id="dashboard-content" style="display: none;">
      <h2>Welcome to Smart Campus Service Management</h2>
      <div class="user-info">
        <p><strong>User:</strong> <span id="user-name">Loading...</span></p>
        <p><strong>Email:</strong> <span id="user-email">Loading...</span></p>
        <p><strong>UID:</strong> <span id="user-uid">Loading...</span></p>
      </div>
      <button onclick="handleLogout()">Logout</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';

    // Firebase config - must match your Firebase project
    const firebaseConfig = {
      apiKey: "AIzaSyAFCaKi_-AIEPjneYyVAP1YTLTJsCZ1wvQ",
      authDomain: "campus-fdb87.firebaseapp.com",
      projectId: "campus-fdb87",
      storageBucket: "campus-fdb87.firebasestorage.app",
      messagingSenderId: "580962580065",
      appId: "1:580962580065:web:a5f2dd942ae2685e901c20",
      measurementId: "G-QWW258FNBV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Protect dashboard using onAuthStateChanged
    onAuthStateChanged(auth, (user) => {
      const authChecking = document.getElementById('auth-checking');
      const authFailed = document.getElementById('auth-failed');
      const dashboardContent = document.getElementById('dashboard-content');

      if (user) {
        // User is logged in - show dashboard
        authChecking.style.display = 'none';
        authFailed.style.display = 'none';
        dashboardContent.style.display = 'block';

        // Display user information
        document.getElementById('user-name').textContent = user.displayName || 'Unknown';
        document.getElementById('user-email').textContent = user.email || 'Unknown';
        document.getElementById('user-uid').textContent = user.uid;
      } else {
        // User is not logged in - redirect to login
        authChecking.style.display = 'none';
        dashboardContent.style.display = 'none';
        authFailed.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      }
    });

    // Logout function
    window.handleLogout = async function() {
      try {
        await signOut(auth);
        window.location.href = '/';
      } catch (error) {
        console.error('Logout error:', error);
        alert('Error logging out: ' + error.message);
      }
    };
  </script>
</body>
</html>
